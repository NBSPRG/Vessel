name: Testing

on:
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - "cmd/**"
      - "internal/**"
      - "pkg/**"
      - "main.go"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - "docker-compose.test.yml"
      - "Dockerfile"
  pull_request:
    paths:
      - "cmd/**"
      - "internal/**"
      - "pkg/**"
      - "main.go"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - "docker-compose.test.yml"
      - "Dockerfile"
  workflow_dispatch:

concurrency:
  group: testing-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.8"
          cache: true

      - name: Run unit tests with coverage
        shell: bash
        run: |
          set -o pipefail
          go test -count=1 -race -coverprofile=coverage.out ./pkg/... -v | tee test-output.txt
          go tool cover -func=coverage.out | tail -1 | tee coverage-summary.txt

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.out
            coverage-summary.txt
            test-output.txt
          retention-days: 14

  distro-tests:
    name: Multi-Distro Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name != 'pull_request'
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run distro compatibility tests
        run: make test-distro
