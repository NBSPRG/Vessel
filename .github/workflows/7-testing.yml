name: 🧪 Regression Testing Agent

on:
  workflow_run:
    workflows: ["🐳 Docker Build & Publish Agent"]
    types: [completed]

jobs:
  test-unit:
    name: Unit Tests (no root needed)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Run unit tests with coverage
        id: unit_tests
        run: |
          go test -count=1 -race -coverprofile=coverage.out ./pkg/... -v 2>&1 | tee test-output.txt
          go tool cover -func=coverage.out | tail -1 | tee coverage-summary.txt
        continue-on-error: true

      - name: AI Fix on test failure
        if: steps.unit_tests.outcome == 'failure'
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-6
          prompt: |
            Unit tests failed for the vessel container runtime (./pkg/...).
            Review CLAUDE.md for project context.

            Test output:
            $(cat test-output.txt | tail -60)

            Steps:
            1. Identify which test(s) failed and why
            2. Fix the failing test or the code it tests (prefer fixing code over tests)
            3. Ensure CGO_ENABLED=0 is preserved
            4. Re-run `go test ./pkg/... -v` to confirm passing
            5. Commit with message: "fix: failing unit tests"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            coverage.out
            coverage-summary.txt
            test-output.txt
          retention-days: 14

  test-distro:
    name: Multi-Distro Integration Tests
    runs-on: ubuntu-latest
    needs: test-unit
    # Requires Docker-in-Docker with privileged mode for namespace operations
    if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Run distro compatibility tests
        id: distro_tests
        run: make test-distro
        continue-on-error: true
        timeout-minutes: 15

      - name: AI Fix on distro test failure
        if: steps.distro_tests.outcome == 'failure'
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-6
          prompt: |
            Multi-distro tests failed for vessel container runtime.
            These tests run vessel inside Docker (docker-compose.test.yml) across Linux distros.
            Review CLAUDE.md for project context.
            Steps:
            1. Read docker-compose.test.yml to understand the test setup
            2. Identify which distro/test combination failed
            3. Fix the compatibility issue (namespace, cgroup, or OverlayFS related)
            4. Do NOT change core Linux primitive usage — that is intentional
            5. Commit with message: "fix: distro compatibility"
