name: Docker

on:
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - "cmd/**"
      - "internal/**"
      - "pkg/**"
      - "main.go"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - ".dockerignore"
      - "Makefile"
    tags:
      - "v*"
  pull_request:
    paths:
      - "cmd/**"
      - "internal/**"
      - "pkg/**"
      - "main.go"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - ".dockerignore"
      - "Makefile"
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  IMAGE_NAME: chandannbsprg/vessel

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version metadata
        id: meta
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          COMMIT=$(git rev-parse --short HEAD)
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          {
            echo "version=$VERSION"
            echo "commit=$COMMIT"
            echo "build_time=$BUILD_TIME"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Decide whether image push is enabled
        id: push_policy
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            {
              echo "enabled=false"
              echo "reason=pull_request"
            } >> "$GITHUB_OUTPUT"
          elif [[ ! "${{ github.ref }}" =~ ^refs/tags/v.+$ ]]; then
            {
              echo "enabled=false"
              echo "reason=not_a_release_tag"
            } >> "$GITHUB_OUTPUT"
          elif [ "${{ github.run_attempt }}" != "1" ]; then
            {
              echo "enabled=false"
              echo "reason=rerun_attempt"
            } >> "$GITHUB_OUTPUT"
          elif [ -z "${{ secrets.DOCKER_USERNAME }}" ] || [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then
            {
              echo "enabled=false"
              echo "reason=missing_dockerhub_secrets"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "enabled=true"
              echo "reason=release_tag_first_attempt"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Show Docker publish policy
        run: |
          echo "push_enabled=${{ steps.push_policy.outputs.enabled }}"
          echo "reason=${{ steps.push_policy.outputs.reason }}"

      - name: Login to Docker Hub
        if: steps.push_policy.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          push: false
          tags: |
            vessel:ci
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.meta.outputs.commit }}
            BUILD_TIME=${{ steps.meta.outputs.build_time }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify local image
        run: |
          docker run --rm vessel:ci --help
          docker image inspect vessel:ci --format='Image size: {{.Size}} bytes'

      - name: Push Docker image
        if: steps.push_policy.outputs.enabled == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.meta.outputs.commit }}
            BUILD_TIME=${{ steps.meta.outputs.build_time }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push debug Docker image
        if: steps.push_policy.outputs.enabled == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          target: debug
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}-debug
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.meta.outputs.commit }}
            BUILD_TIME=${{ steps.meta.outputs.build_time }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
