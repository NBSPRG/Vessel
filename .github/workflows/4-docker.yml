name: 🐳 Docker Build & Publish Agent

on:
  workflow_run:
    workflows: ["🔒 Security & Vulnerability Agent"]
    types: [completed]
  push:
    tags:
      - 'v*'   # Also trigger on version tags

jobs:
  docker:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || startsWith(github.ref, 'refs/tags/') }}
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Need full history for git describe (VERSION)

      - name: Extract version metadata
        id: meta
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          COMMIT=$(git rev-parse --short HEAD)
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT
          echo "build_time=$BUILD_TIME" >> $GITHUB_OUTPUT
          echo "image=chandannbsprg/vessel" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.meta.outputs.commit }}
            BUILD_TIME=${{ steps.meta.outputs.build_time }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image
        run: |
          docker pull chandannbsprg/vessel:latest
          docker run --rm chandannbsprg/vessel:latest --help
          docker image inspect chandannbsprg/vessel:latest \
            --format='Image size: {{.Size}} bytes'

      - name: AI Docker Optimization (on size regression)
        if: failure()
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-6
          prompt: |
            The Docker build or publish step failed for vessel container runtime.
            Review CLAUDE.md for project context.
            Current Dockerfile uses multi-stage: golang:1.21-alpine → alpine:3.18.
            Steps:
            1. Read the build error
            2. Fix the Dockerfile issue (preserve multi-stage structure)
            3. Ensure runtime deps iptables + iproute2 are still included
            4. Do NOT add unnecessary layers
            5. Commit with message: "fix: docker build error"
