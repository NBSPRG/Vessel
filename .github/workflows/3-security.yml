name: Security

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.8"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Install security tools
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@v2.22.2
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Run gosec
        shell: bash
        run: |
          set -o pipefail
          gosec ./... 2>&1 | tee gosec-report.txt

      - name: Run govulncheck
        shell: bash
        run: |
          set -o pipefail
          govulncheck ./... 2>&1 | tee govuln-output.txt

      - name: Check for hardcoded secrets
        run: |
          if grep -RInE --include="*.go" "password\\s*=|secret\\s*=|api_key\\s*=|sk-ant-" .; then
            echo "Possible hardcoded secrets detected"
            exit 1
          fi

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            gosec-report.txt
            govuln-output.txt
          if-no-files-found: ignore
          retention-days: 30
