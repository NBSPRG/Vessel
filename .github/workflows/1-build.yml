name: Build

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.8"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify formatting
        run: test -z "$(gofmt -l .)"

      - name: Run go vet
        run: go vet ./...

      - name: Build binary
        run: make build

      - name: Run unit tests
        run: make test-unit

      - name: Upload binary artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: vessel-binary
          path: vessel
          retention-days: 7
